services:
  - type: web
    name: almau-syllabus
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: bash ./deploy/render-build.sh
    startCommand: bash ./deploy/render-start.sh
    healthCheckPath: /healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: AI_WORKER_PRELOAD_MODEL
        value: "false"
      - key: AI_WORKER_IDLE_SLEEP
        value: "1.0"
      - key: DATABASE_URL
        fromDatabase:
          name: almau-syllabus-db
          property: connectionString

databases:
  - name: almau-syllabus-db
    plan: free
    databaseName: almau_syllabus
    user: almau_syllabus
